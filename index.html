<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCam - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h1>CashCam App is Running!</h1>
        <p id="status-text" style="color: #ff9800; font-weight: bold;">جاري التحقق من البيئة وتوثيق الحساب التجريبي...</p>
        <p>بانتظار إتمام عملية الدفع التجريبية لتخطي الخطوة 10</p>
        
        <button id="pay-button" disabled style="padding: 15px 30px; background: #9e9e9e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px;">
            Pay 0.3 Pi (Testnet)
        </button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        const testCredentials = {
            username: "testuser",
            password: "test123"
        };

        const payButton = document.getElementById('pay-button');
        const statusText = document.getElementById('status-text');

        async function authPiUser() {
            try {
                const scopes = ['username', 'payments'];
                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                console.log("Success:", authResult.user.username);
                setupAppForUser(authResult.user.username);

            } catch (err) {
                console.warn("Fallback to test account:", err);
                if (testCredentials.username === "testuser") {
                    setupAppForUser(testCredentials.username);
                } else {
                    statusText.innerText = "تأكد أنك تستخدم Pi Browser لفتح هذا الرابط.";
                    statusText.style.color = "red";
                }
            }
        }

        function setupAppForUser(username) {
            statusText.innerText = `مرحباً بك ${username}! تم التوثيق بنجاح وجاهز للدفع التجريبي.`;
            statusText.style.color = "green";
            payButton.removeAttribute('disabled');
            payButton.style.background = "#673ab7";
        }

        function onIncompletePaymentFound(payment) {
            console.log("Incomplete payment:", payment);
        }

        window.onload = function() {
            authPiUser();
        };

        payButton.onclick = async function() {
            try {
                statusText.innerText = "جاري معالجة طلب الدفع التجريبي لـ CashCam...";
                
                const payment = await Pi.createPayment({
                    amount: 0.3, 
                    memo: `تجربة دفع للحساب ${testCredentials.username} لتخطي الخطوة 10`,
                    metadata: { 
                        orderId: "CashCam_test_" + Date.now(),
                        developerUser: testCredentials.username
                    },
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        alert("تم إنشاء الدفعة بنجاح! معرّف المعاملة: " + paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        statusText.innerText = "تمت عملية الدفع بنجاح وتخطي الخطوة 10!";
                        statusText.style.color = "green";
                        alert("مبروك ضلعي! العملية نجحت برمجياً. رقم الـ TxID: " + txid);
                    },
                    onCancel: function(paymentId) {
                        statusText.innerText = "تم إلغاء الدفع من قبل المستخدم.";
                        statusText.style.color = "#ff9800";
                        alert("تم إلغاء عملية الدفع");
                    },
                    onError: function(error, payment) {
                        statusText.innerText = "حدث خطأ أثناء معالجة الدفع بالشبكة.";
                        statusText.style.color = "red";
                        alert("حدث خطأ: " + error.message);
                    }
                });
            } catch (err) {
                alert("فشلت المعاملة: " + err.message);
            }
        };
    </script>
</body>
</html>
