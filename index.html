<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CashCam</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Video Feed -->
  <div class="feed">

    <div class="video-container">

      <video autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      </video>

      <div class="overlay"></div>

      <!-- Top Bar -->
      <div class="top-bar">

        <h2>CashCam</h2>

        <button id="loginBtn" class="login-btn">
          Pi Login
        </button>

      </div>

      <!-- Video Info -->
      <div class="video-info">

        <h3>@cashcam</h3>

        <p>Welcome to CashCam 🔥</p>

        <button id="payBtn" class="reward-btn">
          Earn Bonus π
        </button>

        <p id="status"></p>

      </div>

      <!-- Actions -->
      <div class="actions">

        <button>❤️</button>

        <button>💬</button>

        <button>🔗</button>

      </div>

    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">

    <button>🏠</button>

    <button>👥</button>

    <button class="upload-btn">＋</button>

    <button>📩</button>

    <button>👤</button>

  </div>

<script>

Pi.init({

    version: "2.0",

    sandbox: true

});

let currentUser = null;



/* =========================
   LOGIN
========================= */

document.getElementById("loginBtn").onclick =
async () => {

    try {

        document.getElementById("status").innerText =
            "Logging in...";

        currentUser = await Pi.authenticate(

            ['payments'],

            async function(payment) {

                console.log(
                    "Incomplete payment found:",
                    payment
                );

                document.getElementById("status").innerText =
                    "Pending payment detected...";

                try {

                    await fetch("/api/complete", {

                        method: "POST",

                        headers: {

                            "Content-Type":
                            "application/json"

                        },

                        body: JSON.stringify({

                            paymentId:
                            payment.identifier,

                            txid:
                            payment.transaction?.txid || ""

                        })

                    });

                    console.log(
                        "Pending payment completed"
                    );

                    document.getElementById("status").innerText =
                        "Pending payment cleared";

                } catch(err) {

                    console.error(
                        "Pending cleanup failed:",
                        err
                    );

                    document.getElementById("status").innerText =
                        "Failed to clear pending payment";
                }
            }
        );

        document.getElementById("status").innerText =
            "Logged in as: " +
            currentUser.username;

    } catch(err) {

        console.error(err);

        document.getElementById("status").innerText =
            "Login Failed";
    }
};



/* =========================
   PAYMENT
========================= */

document.getElementById("payBtn").onclick =
async () => {

    if (!currentUser) {

        document.getElementById("status").innerText =
            "Please login first";

        return;
    }

    try {

        const paymentData = {

            amount: 0.071,

            memo: "CashCam Payment 2026",

            metadata: {

                app: "CashCam",

                time: Date.now()

            }
        };

        Pi.createPayment(

            paymentData,

            {

                onReadyForServerApproval:
                async function(paymentId) {

                    try {

                        await fetch("/api/approve", {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                "application/json"

                            },

                            body: JSON.stringify({

                                paymentId:
                                paymentId

                            })

                        });

                    } catch(err) {

                        document.getElementById("status").innerText =
                            "Approval Failed";
                    }
                },



                onReadyForServerCompletion:
                async function(paymentId, txid) {

                    try {

                        await fetch("/api/complete", {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                "application/json"

                            },

                            body: JSON.stringify({

                                paymentId:
                                paymentId,

                                txid:
                                txid

                            })

                        });

                        document.getElementById("status").innerText =
                            "Payment Completed Successfully";

                    } catch(err) {

                        document.getElementById("status").innerText =
                            "Completion Failed";
                    }
                },



                onCancel: function(paymentId) {

                    document.getElementById("status").innerText =
                        "Payment Cancelled";
                },



                onError: function(error, payment) {

                    document.getElementById("status").innerText =
                        "Payment Error";
                }
            }
        );

    } catch(err) {

        document.getElementById("status").innerText =
            "Unexpected Error";
    }
};

</script>

</body>

</html>
