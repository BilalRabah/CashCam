<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 100px;">
    <h2>CashCam - Step 10</h2>
    <button id="pay-btn" style="padding: 20px 40px; background: #673ab7; color: white; border-radius: 10px; font-size: 20px; border: none; cursor: pointer;">
        PAY 1 TEST-PI
    </button>

    <script>
        const Pi = window.Pi;
        
        Pi.init({ 
            version: "2.0", 
            sandbox: true,
            apiKey: "7pnt97vfxsmdl87tz609sdhmwkl60arioq3nrabmzpybyhaevhkxtkn1k5qrjt0w" 
        });

        document.getElementById('pay-btn').onclick = function() {
            Pi.createPayment({
                amount: 1,
                memo: "Final Step 10 Activation",
                metadata: { orderId: "bilal-cashcam-10" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Payment Ready for Approval");
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("Success! Step 10 Completed.");
                },
                onCancel: function(paymentId) { 
                    console.log("Payment Cancelled"); 
                },
                onError: function(error) { 
                    alert("Error: " + error.message);
                }
            });
        };
    </script>
</body>
</html>
