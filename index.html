<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>CashCam Pi Test</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h1>CashCam Pi Test Payment</h1>

<button id="loginBtn">
    Login with Pi
</button>

<br><br>

<button id="payBtn">
    Pay 0.031 Pi
</button>

<p id="status"></p>

<script>

Pi.init({
    version: "2.0",
    sandbox: true
});

let currentUser = null;

document.getElementById("loginBtn").onclick = async () => {

    try {

        currentUser = await Pi.authenticate(

            ['payments'],

            async function(payment) {

                console.log("Incomplete payment found", payment);

                document.getElementById("status").innerText =
                    "Cleaning pending payment...";

                try {

                    await fetch("/api/complete", {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            paymentId: payment.identifier,

                            txid:
                            payment.transaction?.txid || ""

                        })

                    });

                    document.getElementById("status").innerText =
                        "Pending payment cleared";

                } catch(err) {

                    console.error(err);

                    document.getElementById("status").innerText =
                        "Failed to clear pending payment";
                }
            }
        );

        document.getElementById("status").innerText =
            "Logged in as: " + currentUser.username;

    } catch (err) {

        console.error(err);

        document.getElementById("status").innerText =
            "Login Failed";
    }
};

document.getElementById("payBtn").onclick = async () => {

    try {

        const paymentData = {

            amount: 0.031,

            memo: "CashCam Test Payment",

            metadata: {

                app: "CashCam"

            }
        };

        Pi.createPayment(

            paymentData,

            {

                onReadyForServerApproval:
                async function(paymentId) {

                    console.log(
                        "Ready for approval",
                        paymentId
                    );

                    document.getElementById("status").innerText =
                        "Approving payment...";

                    try {

                        const response =
                        await fetch("/api/approve", {

                            method: "POST",

                            headers: {
                                "Content-Type":
                                "application/json"
                            },

                            body: JSON.stringify({

                                paymentId: paymentId

                            })

                        });

                        const data =
                        await response.json();

                        console.log(data);

                    } catch(err) {

                        console.error(err);

                        document.getElementById("status").innerText =
                            "Approval Failed";
                    }
                },

                onReadyForServerCompletion:
                async function(paymentId, txid) {

                    console.log(
                        "Ready for completion",
                        paymentId,
                        txid
                    );

                    document.getElementById("status").innerText =
                        "Completing payment...";

                    try {

                        const response =
                        await fetch("/api/complete", {

                            method: "POST",

                            headers: {
                                "Content-Type":
                                "application/json"
                            },

                            body: JSON.stringify({

                                paymentId: paymentId,

                                txid: txid

                            })

                        });

                        const data =
                        await response.json();

                        console.log(data);

                        document.getElementById("status").innerText =
                            "Payment Completed Successfully";

                    } catch(err) {

                        console.error(err);

                        document.getElementById("status").innerText =
                            "Completion Failed";
                    }
                },

                onCancel: function(paymentId) {

                    console.log(
                        "Payment Cancelled",
                        paymentId
                    );

                    document.getElementById("status").innerText =
                        "Payment Cancelled";
                },

                onError: function(error, payment) {

                    console.error(
                        "Payment Error",
                        error
                    );

                    document.getElementById("status").innerText =
                        "Payment Error";
                }
            }
        );

    } catch(err) {

        console.error(err);

        document.getElementById("status").innerText =
            "Unexpected Error";
    }
};

</script>

</body>

</html>
