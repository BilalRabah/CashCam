<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: Arial; padding-top: 50px;">
    <h2>تطبيق CashCam</h2>
    <button id="pay-btn" style="padding: 20px; background: purple; color: white; border-radius: 10px; font-size: 18px;">
        دفع 1 باي لتفعيل الخطوة 10
    </button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-btn').onclick = function() {
            Pi.createPayment({
                amount: 1,
                memo: "إتمام الخطوة 10 بنجاح",
                metadata: { orderId: "bilal-final-step" }
            }, {
                onReadyForServerApproval: function(id) { console.log("Approved"); },
                onReadyForServerCompletion: function(id, tx) { alert("تمت العملية! مبروك الـ 10/10"); },
                onCancel: function(id) { },
                onError: function(err) { alert("خطأ: " + err.message); }
            });
        };
    </script>
</body>
</html>
