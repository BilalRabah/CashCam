<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>CashCam Pi Payment</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h1>CashCam Pi Test Payment</h1>

<button id="loginBtn">
    Login with Pi
</button>

<br><br>

<button id="payBtn">
    Pay 0.071 Pi
</button>

<br><br>

<button
    id="clearBtn"
    style="
    background:red;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    "
>
    Clear Pending Payments
</button>

<br><br>

<p id="status"></p>

<script>

Pi.init({

    version: "2.0",

    sandbox: true

});

let currentUser = null;



/* =========================
   LOGIN
========================= */

document.getElementById("loginBtn").onclick =
async () => {

    try {

        document.getElementById("status").innerText =
            "Logging in...";

        currentUser = await Pi.authenticate(

            ['payments'],

            async function(payment) {

                console.log(
                    "Incomplete payment found:",
                    payment
                );

                document.getElementById("status").innerText =
                    "Pending payment detected...";

                try {

                    await fetch("/api/complete", {

                        method: "POST",

                        headers: {

                            "Content-Type":
                            "application/json"

                        },

                        body: JSON.stringify({

                            paymentId:
                            payment.identifier,

                            txid:
                            payment.transaction?.txid || ""

                        })

                    });

                    console.log(
                        "Pending payment completed"
                    );

                    document.getElementById("status").innerText =
                        "Pending payment cleared";

                } catch(err) {

                    console.error(
                        "Pending cleanup failed:",
                        err
                    );

                    document.getElementById("status").innerText =
                        "Failed to clear pending payment";
                }
            }
        );

        document.getElementById("status").innerText =
            "Logged in as: " +
            currentUser.username;

    } catch(err) {

        console.error(err);

        document.getElementById("status").innerText =
            "Login Failed";
    }
};



/* =========================
   PAYMENT
========================= */

document.getElementById("payBtn").onclick =
async () => {

    if (!currentUser) {

        document.getElementById("status").innerText =
            "Please login first";

        return;
    }

    try {

        const paymentData = {

            amount: 0.071,

            memo: "CashCam Payment 2026",

            metadata: {

                app: "CashCam",

                time: Date.now()

            }
        };

        Pi.createPayment(

            paymentData,

            {

                onReadyForServerApproval:
                async function(paymentId) {

                    console.log(
                        "Ready for approval:",
                        paymentId
                    );

                    document.getElementById("status").innerText =
                        "Approving payment...";

                    try {

                        const response =
                        await fetch("/api/approve", {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                "application/json"

                            },

                            body: JSON.stringify({

                                paymentId:
                                paymentId

                            })

                        });

                        const data =
                        await response.json();

                        console.log(
                            "Approval response:",
                            data
                        );

                    } catch(err) {

                        console.error(
                            "Approval error:",
                            err
                        );

                        document.getElementById("status").innerText =
                            "Approval Failed";
                    }
                },



                onReadyForServerCompletion:
                async function(paymentId, txid) {

                    console.log(
                        "Ready for completion:",
                        paymentId,
                        txid
                    );

                    document.getElementById("status").innerText =
                        "Completing payment...";

                    try {

                        const response =
                        await fetch("/api/complete", {

                            method: "POST",

                            headers: {

                                "Content-Type":
                                "application/json"

                            },

                            body: JSON.stringify({

                                paymentId:
                                paymentId,

                                txid:
                                txid

                            })

                        });

                        const data =
                        await response.json();

                        console.log(
                            "Completion response:",
                            data
                        );

                        document.getElementById("status").innerText =
                            "Payment Completed Successfully";

                    } catch(err) {

                        console.error(
                            "Completion error:",
                            err
                        );

                        document.getElementById("status").innerText =
                            "Completion Failed";
                    }
                },



                onCancel: function(paymentId) {

                    console.log(
                        "Payment Cancelled:",
                        paymentId
                    );

                    document.getElementById("status").innerText =
                        "Payment Cancelled";
                },



                onError: function(error, payment) {

                    console.error(
                        "Payment Error:",
                        error
                    );

                    document.getElementById("status").innerText =
                        "Payment Error";
                }
            }
        );

    } catch(err) {

        console.error(err);

        document.getElementById("status").innerText =
            "Unexpected Error";
    }
};



/* =========================
   CLEAR PENDING
========================= */

document.getElementById("clearBtn").onclick =
async () => {

    try {

        localStorage.clear();

        sessionStorage.clear();

        document.getElementById("status").innerText =
            "Pending cache cleared";

        setTimeout(() => {

            location.reload();

        }, 1500);

    } catch(err) {

        console.error(err);

        document.getElementById("status").innerText =
            "Clear failed";
    }
};

</script>

</body>

</html>
