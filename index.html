<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 100px; background-color: #f8f9fa;">
    <div style="background: white; display: inline-block; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: #333;">CashCam App</h2>
        <p style="color: #666;">Step 10 - Payment Verification</p>
        
        <button id="pay-btn" style="padding: 20px 50px; background: #673ab7; color: white; border-radius: 12px; font-size: 22px; border: none; cursor: pointer; font-weight: bold;">
            PAY 1.0 PI
        </button>
    </div>

    <script>
        const Pi = window.Pi;
        
        // تم تثبيت مفتاحك الشخصي هنا بنجاح
        Pi.init({ 
            version: "2.0", 
            sandbox: true,
            apiKey: "7pnt97vfxsmdl87tz609sdhmwkl60arioq3nrabmzpybyhaevhkxtkn1k5qrjt0w" 
        });

        document.getElementById('pay-btn').onclick = function() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Step 10 Activation",
                metadata: { orderId: "order-10-cashcam" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Payment Ready");
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("Success! Step 10 Completed.");
                },
                onCancel: function(paymentId) { },
                onError: function(error) { 
                    alert("Error: " + error.message);
                }
            });
        };
    </script>
</body>
</html>
