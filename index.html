<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashCam Pi Test</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h1>CashCam Pi Test Payment</h1>

<button id="loginBtn">
Login with Pi
</button>

<br><br>

<button id="payBtn">
Pay 0.01 Pi
</button>

<p id="status"></p>

<script>
Pi.init({ version: "2.0", sandbox: true });

let currentUser = null;

document.getElementById("loginBtn").onclick = async () => {
    try {
        currentUser = await Pi.authenticate(
            ['payments'],
            function(payment) {
                console.log("Incomplete payment found");
            }
        );

        document.getElementById("status").innerText =
            "Logged in as: " + currentUser.username;

    } catch (err) {
        alert(err);
    }
};

document.getElementById("payBtn").onclick = async () => {

    try {

        const paymentData = {
            amount: 0.01,
            memo: "CashCam Test Payment",
            metadata: { app: "CashCam" }
        };

        Pi.createPayment(
            paymentData,

            {
                onReadyForServerApproval: function(paymentId) {

                    console.log("Ready for approval", paymentId);

                    document.getElementById("status").innerText =
                        "Payment created: " + paymentId + " Sending to Vercel for approval...";

                    // الربط المباشر مع السيرفر مالتك اللي رفعناه على Vercel
                    fetch("/api/approve", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ paymentId })
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log("Server response:", data);
                    })
                    .catch(err => {
                        console.error("Fetch error:", err);
                    });
                },

                onReadyForServerCompletion: function(paymentId, txid) {

                    console.log("Ready for completion", paymentId, txid);

                    document.getElementById("status").innerText =
                        "Payment Success TXID: " + txid;
                },

                onCancel: function(paymentId) {

                    console.log("Cancelled", paymentId);

                    document.getElementById("status").innerText =
                        "Payment Cancelled";
                },

                onError: function(error, payment) {

                    console.error(error);

                    document.getElementById("status").innerText =
                        "Payment Error";
                }
            }
        );

    } catch (err) {

        console.error(err);

    }
};
</script>

</body>
</html>
