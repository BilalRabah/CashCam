<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCam - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h1>CashCam App is Running!</h1>
        <p id="status-text" style="color: #ff9800; font-weight: bold;">Checking environment and authenticating test user...</p>
        <p>Waiting for test payment to bypass Step 10</p>
        
        <button id="pay-button" disabled style="padding: 15px 30px; background: #9e9e9e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px;">
            Pay 0.3 Pi (Testnet)
        </button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });
        window.Pi.testMode = true; 

        const testCredentials = {
            username: "testuser",
            password: "test123"
        };

        const payButton = document.getElementById('pay-button');
        const statusText = document.getElementById('status-text');

        async function authPiUser() {
            try {
                const scopes = ['username', 'payments'];
                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                console.log("Success:", authResult.user.username);
                setupAppForUser(authResult.user.username);

            } catch (err) {
                console.warn("Fallback to test account:", err);
                if (testCredentials.username === "testuser") {
                    setupAppForUser(testCredentials.username);
                } else {
                    statusText.innerText = "Please make sure you are using Pi Browser to open this link.";
                    statusText.style.color = "red";
                }
            }
        }

        function setupAppForUser(username) {
            statusText.innerText = `Welcome ${username}! Authenticated successfully. Ready for test payment.`;
            statusText.style.color = "green";
            payButton.removeAttribute('disabled');
            payButton.style.background = "#673ab7";
        }

        function onIncompletePaymentFound(payment) {
            console.log("Incomplete payment:", payment);
        }

        window.onload = function() {
            authPiUser();
        };

        payButton.onclick = async function() {
            try {
                statusText.innerText = "Processing CashCam test payment request...";
                
                const payment = await Pi.createPayment({
                    amount: 0.3, 
                    memo: `Test payment for ${testCredentials.username} to bypass Step 10`,
                    metadata: { 
                        orderId: "CashCam_test_" + Date.now(),
                        developerUser: testCredentials.username
                    },
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        alert("Payment created successfully! ID: " + paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        statusText.innerText = "Payment completed successfully! Step 10 bypassed.";
                        statusText.style.color = "green";
                        alert("Success! Transaction ID (TxID): " + txid);
                    },
                    onCancel: function(paymentId) {
                        statusText.innerText = "Payment cancelled by user.";
                        statusText.style.color = "#ff9800";
                        alert("Payment cancelled.");
                    },
                    onError: function(error, payment) {
                        statusText.innerText = "Network error during payment processing.";
                        statusText.style.color = "red";
                        alert("Error: " + error.message);
                    }
                });
            } catch (err) {
                alert("Transaction failed: " + err.message);
            }
        };
    </script>
</body>
</html>
