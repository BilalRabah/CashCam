<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: Arial; padding-top: 50px;">
    <h2>تطبيق CashCam</h2>
    <p>اضغط على الزر أدناه لإتمام عملية الدفع التجريبية</p>
    <button id="pay-btn" style="padding: 20px; background: purple; color: white; border-radius: 10px; font-size: 18px; cursor: pointer;">
        دفع 1 باي لتفعيل الخطوة 10
    </button>

    <script>
        const Pi = window.Pi;
        
        // ربط المفتاح الجديد هنا ليعمل الزر فوراً
        Pi.init({ 
            version: "2.0", 
            sandbox: true,
            apiKey: "ynvm057kfszktn4medynjk4vroqbj0ykcvlxde5q2zoccyopfp9dv6isrzg14ome" 
        });

        document.getElementById('pay-btn').onclick = function() {
            Pi.createPayment({
                amount: 1,
                memo: "إتمام الخطوة 10 بنجاح - بلال رباح",
                metadata: { orderId: "bilal-cashcam-final" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("تم الإرسال للموافقة: " + paymentId);
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("عاشت يدك! تمت العملية بنجاح. الآن اذهب للـ Checklist.");
                },
                onCancel: function(paymentId) { console.log("تم إلغاء العملية"); },
                onError: function(error, payment) { 
                    alert("خطأ: تأكد من فتح الرابط داخل Pi Browser حصراً.");
                }
            });
        };
    </script>
</body>
</html>
