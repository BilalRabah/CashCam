<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background-color: #673ab7; color: white; border: none; padding: 20px 40px; font-size: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #512da8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>تطبيق CashCam</h2>
        <p>اضغط على الزر أدناه لإكمال الخطوة 10</p>
        <button id="pay-btn">دفع 1 باي للتفعيل</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ 
            version: "2.0", 
            sandbox: true,
            apiKey: "7pnt97vfxsmdl87tz609sdhmwkl60arioq3nrabmzpybyhaevhkxtkn1k5qrjt0w" 
        });

        document.getElementById('pay-btn').onclick = function() {
            Pi.createPayment({
                amount: 1,
                memo: "تفعيل الخطوة 10 - كاش كام",
                metadata: { orderId: "final-step-10" }
            }, {
                onReadyForServerApproval: function(id) { console.log("Approved"); },
                onReadyForServerCompletion: function(id, tx) { alert("تمت العملية بنجاح! مبروك الـ 10/10"); },
                onCancel: function(id) { },
                onError: function(err) { alert("تأكد من فتح الرابط داخل Pi Browser حصراً"); }
            });
        };
    </script>
</body>
</html>
